# SwiftGen configuration for iOS localization
strings:
  inputs:
    - packages/ios/Sources/Localization/Resources/en.lproj/Localizable.strings
  outputs:
    - templateName: structured-swift5
      output: packages/ios/Sources/Localization/Generated/L10n.swift
      params:
        enumName: L10n
        publicAccess: true
        tableName: Localizable
        ignoreEmptyStrings: true
        ignoreComments: true
        stripComments: true
        generateSwiftUI: true
        generateUIKit: true
        generateFoundation: true
