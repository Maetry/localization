name: Localization Pipeline

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'resources/**'
      - 'tools/**'
      - '.github/workflows/localization.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'resources/**'
      - 'tools/**'
      - '.github/workflows/localization.yml'
  schedule:
    # Run daily at 2 AM UTC to sync with Crowdin
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      sync_crowdin:
        description: 'Sync with Crowdin'
        required: false
        default: 'false'
        type: boolean

env:
  NODE_VERSION: '18'
  SWIFT_VERSION: '5.9'

jobs:
  # Job 1: Generate Swift code
  generate:
    name: Generate Swift Code
    runs-on: ubuntu-latest
    outputs:
      files-changed: ${{ steps.changes.outputs.files }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Setup Swift
        uses: swift-actions/setup-swift@v1
        with:
          swift-version: ${{ env.SWIFT_VERSION }}
      
      - name: Install SwiftGen
        run: |
          if ! command -v swiftgen &> /dev/null; then
            brew install swiftgen
          fi
      
      - name: Run SwiftGen
        run: npm run swiftgen
      
      - name: Check for changes
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "files-changed=true" >> $GITHUB_OUTPUT
          else
            echo "files-changed=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Commit generated files
        if: steps.changes.outputs.files == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add packages/
          git commit -m "chore: regenerate platform files [skip ci]"
          git push

  # Job 2: Test generated files
  test:
    name: Test Generated Files
    runs-on: ubuntu-latest
    needs: generate
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Setup Swift
        uses: actions/setup-swift@v1
        with:
          swift-version: ${{ env.SWIFT_VERSION }}
      
      - name: Test iOS package
        run: |
          cd packages/ios
          swift test
      
      - name: Test Web package
        run: |
          cd packages/web
          npm test
      
      - name: Test Android package
        run: |
          cd packages/android
          ./gradlew test

  # Job 3: Build packages
  build:
    name: Build Packages
    runs-on: ubuntu-latest
    needs: [generate, test]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Setup Swift
        uses: actions/setup-swift@v1
        with:
          swift-version: ${{ env.SWIFT_VERSION }}
      
      - name: Build iOS package
        run: |
          cd packages/ios
          swift build
      
      - name: Build Web package
        run: |
          cd packages/web
          npm run build
      
      - name: Build Android package
        run: |
          cd packages/android
          ./gradlew build

  # Job 4: Sync with Crowdin and Publish (conditional)
  crowdin-sync:
    name: Sync with Crowdin and Publish
    runs-on: ubuntu-latest
    needs: [generate, test, build]
    if: github.event_name == 'schedule' || github.event.inputs.sync_crowdin == 'true'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Install Crowdin CLI
        run: npm install -g @crowdin/cli
      
      - name: Sync with Crowdin
        env:
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_API_TOKEN: ${{ secrets.CROWDIN_API_TOKEN }}
        run: |
          node tools/scripts/crowdin-sync.js
      
      - name: Publish packages
        if: github.event_name == 'schedule'
        run: |
          node tools/scripts/publish-packages.js

  # Job 5: Create release (on main branch)
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [generate, test, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      
      - name: Create release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.version.outputs.version }}
          release_name: Release v${{ steps.version.outputs.version }}
          body: |
            ## Changes in this release
            
            - Updated localization files
            - Regenerated platform-specific packages
            - Synced with Crowdin translations
            
            ## Packages
            
            - **iOS**: Swift Package Manager
            - **Android**: Gradle package
            - **Web**: npm package for Next.js + next-intl
          draft: false
          prerelease: false
